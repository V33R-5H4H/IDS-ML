<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>IDS-ML v2.0 — Login</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet"/>
  <link href="css/style.css" rel="stylesheet"/>
</head>
<body class="login-body">
  <div id="particles" class="particles"></div>

  <div class="login-wrapper">
    <div class="login-brand">
      <div class="brand-icon"><i class="bi bi-shield-fill-check"></i></div>
      <div class="brand-title">IDS-ML <span>v2.0</span></div>
      <div class="brand-sub">Network Intrusion Detection System</div>
    </div>

    <div class="login-card">
      <div class="card-header-custom">
        <i class="bi bi-lock-fill me-2"></i>Secure Login
      </div>

      <div id="alertBox" class="alert-area d-none"></div>

      <form id="loginForm" autocomplete="off">
        <div class="input-group-custom">
          <label class="form-label-custom"><i class="bi bi-person me-1"></i>Username</label>
          <input type="text" id="username" class="form-input-custom"
                 placeholder="Enter username" autocomplete="off"/>
        </div>

        <div class="input-group-custom">
          <label class="form-label-custom"><i class="bi bi-key me-1"></i>Password</label>
          <div class="input-wrapper password-wrapper">
            <input type="password" id="password" class="form-input-custom"
                   placeholder="Enter password"/>
            <button type="button" class="toggle-password"
                    onclick="togglePassword()">
              <i id="eyeIcon" class="bi bi-eye"></i>
            </button>
          </div>
        </div>

        <label class="remember-label mt-1 mb-3">
          <input type="checkbox" id="rememberMe" class="remember-check"/>
          Remember me
        </label>

        <button type="submit" class="btn-login" id="loginBtn">
          <span id="btnText"><i class="bi bi-box-arrow-in-right me-2"></i>Login</span>
          <span id="btnSpinner" class="d-none">
            <span class="spinner-border spinner-border-sm me-2"></span>Signing in...
          </span>
        </button>
      </form>

      <!-- Quick access -->
      <div class="quick-access">
        <div class="quick-title">Quick Access (Dev)</div>
        <div class="quick-buttons">
          <button class="quick-btn admin"   onclick="quickLogin('admin','admin123')">
            <i class="bi bi-shield-fill"></i>Admin
          </button>
          <button class="quick-btn analyst" onclick="quickLogin('analyst','analyst123')">
            <i class="bi bi-person-badge-fill"></i>Analyst
          </button>
          <button class="quick-btn viewer"  onclick="quickLogin('viewer','viewer123')">
            <i class="bi bi-eye-fill"></i>Viewer
          </button>
        </div>
      </div>

      <!-- Register link -->
      <div class="text-center mt-3" style="font-size:0.88rem;color:var(--text-muted)">
        No account?
        <a href="register.html" style="color:var(--primary);font-weight:600">
          <i class="bi bi-person-plus me-1"></i>Create one
        </a>
      </div>
    </div>

    <div class="login-footer">
      <i class="bi bi-shield-check me-1"></i>Protected by JWT Authentication • IDS-ML v2.0
    </div>
  </div>

  <script src="js/auth.js"></script>
  <script src="js/login.js"></script>
</body>
</html>
