<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>IDS-ML v2.0 — Login</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
  <link rel="stylesheet" href="css/style.css"/>
</head>
<body class="auth-body">

<div class="auth-bg">
  <div class="auth-glow auth-glow-1"></div>
  <div class="auth-glow auth-glow-2"></div>
</div>

<div class="auth-wrap">
  <div class="auth-card">

    <!-- Logo -->
    <div class="auth-logo">
      <i class="bi bi-shield-fill-check auth-logo-icon"></i>
      <div>
        <div class="auth-logo-title">IDS-ML <span class="auth-logo-ver">v2.0</span></div>
        <div class="auth-logo-sub">Intrusion Detection System</div>
      </div>
    </div>

    <h2 class="auth-heading">Sign In</h2>
    <p class="auth-sub">Enter your credentials to access the dashboard</p>

    <div id="loginAlert" class="auth-alert d-none"></div>

    <form id="loginForm" onsubmit="handleLogin(event)" novalidate>
      <div class="form-group">
        <label class="form-label"><i class="bi bi-person me-1"></i>Username</label>
        <input type="text" id="loginUsername" class="form-input"
               placeholder="Enter username" autocomplete="username" required/>
      </div>

      <div class="form-group">
        <label class="form-label"><i class="bi bi-lock me-1"></i>Password</label>
        <div class="input-pw-wrap">
          <input type="password" id="loginPassword" class="form-input"
                 placeholder="Enter password" autocomplete="current-password" required/>
          <button type="button" class="pw-toggle" onclick="togglePw('loginPassword',this)"
                  tabindex="-1">
            <i class="bi bi-eye"></i>
          </button>
        </div>
      </div>

      <div class="form-check-row">
        <label class="form-check">
          <input type="checkbox" id="rememberMe"/>
          <span>Remember me</span>
        </label>
        <button type="button" class="link-btn" onclick="showForgot()">
          Forgot password?
        </button>
      </div>

      <button type="submit" class="btn btn-primary btn-full" id="loginBtn">
        <i class="bi bi-box-arrow-in-right me-2"></i>Sign In
      </button>
    </form>

    <div class="auth-divider"><span>or</span></div>

    <p class="auth-switch">
      Don't have an account?
      <a href="register.html" class="link-accent">Create account</a>
    </p>

  </div>
</div>

<!-- Forgot Password Modal -->
<div id="forgotModal" class="modal-overlay" style="display:none;"
     onclick="if(event.target===this)hideForgot()">
  <div class="modal-box" onclick="event.stopPropagation()">
    <div class="modal-header">
      <h3><i class="bi bi-key-fill me-2" style="color:#fcd34d;"></i>Reset Password</h3>
      <button class="btn-icon" onclick="hideForgot()"><i class="bi bi-x-lg"></i></button>
    </div>
    <div class="modal-body">
      <p style="color:var(--text-muted);font-size:0.85rem;margin-bottom:14px;">
        Enter your username or email and a reason. An admin will reset your password.
      </p>
      <div id="forgotAlert" class="auth-alert d-none" style="margin-bottom:12px;"></div>
      <div class="form-group">
        <label class="form-label">Username or Email</label>
        <input type="text" id="forgotIdentifier" class="form-input" placeholder="your_username"/>
      </div>
      <div class="form-group">
        <label class="form-label">Reason (optional)</label>
        <textarea id="forgotReason" class="form-input" rows="2"
                  placeholder="e.g. Forgot my password"></textarea>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="hideForgot()">Cancel</button>
      <button class="btn btn-primary" onclick="submitForgot()">
        <i class="bi bi-send me-1"></i>Send Request
      </button>
    </div>
  </div>
</div>

<script src="js/config.js"></script>
<script src="js/auth.js"></script>
<script src="js/api.js"></script>
<script src="js/login.js"></script>
</body>
</html>
