<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>IDS-ML v2.0 — Login</title>

  <!-- Bootstrap 5 -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <!-- Bootstrap Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet"/>
  <!-- Custom CSS -->
  <link href="css/style.css" rel="stylesheet"/>
</head>
<body class="login-body">

  <!-- Animated background particles -->
  <div class="particles" id="particles"></div>

  <div class="login-wrapper">
    <!-- Brand Header -->
    <div class="login-brand">
      <div class="brand-icon">
        <i class="bi bi-shield-fill-check"></i>
      </div>
      <h1 class="brand-title">IDS-ML <span>v2.0</span></h1>
      <p class="brand-sub">Network Intrusion Detection System</p>
    </div>

    <!-- Login Card -->
    <div class="login-card">
      <div class="card-header-custom">
        <i class="bi bi-lock-fill me-2"></i> Secure Login
      </div>

      <!-- Alert Area -->
      <div id="alertBox" class="alert-area d-none"></div>

      <form id="loginForm" novalidate>
        <!-- Username -->
        <div class="input-group-custom">
          <label class="form-label-custom" for="username">
            <i class="bi bi-person-fill me-1"></i> Username
          </label>
          <div class="input-wrapper">
            <input
              type="text"
              id="username"
              class="form-input-custom"
              placeholder="Enter username"
              required
              autocomplete="username"
            />
          </div>
        </div>

        <!-- Password -->
        <div class="input-group-custom">
          <label class="form-label-custom" for="password">
            <i class="bi bi-key-fill me-1"></i> Password
          </label>
          <div class="input-wrapper password-wrapper">
            <input
              type="password"
              id="password"
              class="form-input-custom"
              placeholder="Enter password"
              required
              autocomplete="current-password"
            />
            <button type="button" class="toggle-password" onclick="togglePassword()">
              <i class="bi bi-eye" id="eyeIcon"></i>
            </button>
          </div>
        </div>

        <!-- Remember me -->
        <div class="d-flex align-items-center justify-content-between mb-3">
          <label class="remember-label">
            <input type="checkbox" id="rememberMe" class="remember-check"/>
            <span>Remember me</span>
          </label>
        </div>

        <!-- Submit Button -->
        <button type="submit" class="btn-login" id="loginBtn">
          <span id="btnText"><i class="bi bi-box-arrow-in-right me-2"></i>Login</span>
          <span id="btnSpinner" class="d-none">
            <span class="spinner-border spinner-border-sm me-2"></span>Authenticating...
          </span>
        </button>
      </form>

      <!-- Quick Access (Dev Only) -->
      <div class="quick-access">
        <p class="quick-title">Quick Access (Dev)</p>
        <div class="quick-buttons">
          <button class="quick-btn admin"   onclick="quickLogin('admin','admin123')">
            <i class="bi bi-shield-fill"></i> Admin
          </button>
          <button class="quick-btn analyst" onclick="quickLogin('analyst','analyst123')">
            <i class="bi bi-person-badge-fill"></i> Analyst
          </button>
          <button class="quick-btn viewer"  onclick="quickLogin('viewer','viewer123')">
            <i class="bi bi-eye-fill"></i> Viewer
          </button>
        </div>
      </div>
    </div>

    <!-- Footer -->
    <p class="login-footer">
      <i class="bi bi-shield-lock me-1"></i>
      Protected by JWT Authentication &bull; IDS-ML v2.0
    </p>
  </div>

  <script src="js/auth.js"></script>
  <script src="js/login.js"></script>
</body>
</html>
