<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>IDS-ML v2.0 — Register</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet"/>
  <link href="css/style.css" rel="stylesheet"/>
</head>
<body class="login-body">
  <div id="particles" class="particles"></div>

  <div class="login-wrapper">
    <!-- Brand -->
    <div class="login-brand">
      <div class="brand-icon"><i class="bi bi-shield-fill-check"></i></div>
      <div class="brand-title">IDS-ML <span>v2.0</span></div>
      <div class="brand-sub">Network Intrusion Detection System</div>
    </div>

    <!-- Card -->
    <div class="login-card">
      <div class="card-header-custom">
        <i class="bi bi-person-plus-fill me-2"></i>Create Account
      </div>

      <!-- Alert -->
      <div id="alertBox" class="alert-area d-none"></div>

      <form id="registerForm" autocomplete="off">

        <!-- Username -->
        <div class="input-group-custom">
          <label class="form-label-custom">Username</label>
          <div class="input-wrapper">
            <input type="text" id="username" class="form-input-custom"
                   placeholder="Choose a username" autocomplete="off" required/>
          </div>
        </div>

        <!-- Email -->
        <div class="input-group-custom">
          <label class="form-label-custom">Email</label>
          <div class="input-wrapper">
            <input type="email" id="email" class="form-input-custom"
                   placeholder="your@email.com" autocomplete="off" required/>
          </div>
        </div>

        <!-- Password -->
        <div class="input-group-custom">
          <label class="form-label-custom">Password</label>
          <div class="input-wrapper password-wrapper">
            <input type="password" id="password" class="form-input-custom"
                   placeholder="Min. 6 characters" autocomplete="new-password" required/>
            <button type="button" class="toggle-password" onclick="togglePass('password','eyeIcon1')">
              <i id="eyeIcon1" class="bi bi-eye"></i>
            </button>
          </div>
          <!-- Password strength bar -->
          <div class="pwd-strength-bar mt-2">
            <div class="pwd-strength-fill" id="pwdFill"></div>
          </div>
          <div class="pwd-strength-label" id="pwdLabel"></div>
        </div>

        <!-- Confirm Password -->
        <div class="input-group-custom">
          <label class="form-label-custom">Confirm Password</label>
          <div class="input-wrapper password-wrapper">
            <input type="password" id="confirmPassword" class="form-input-custom"
                   placeholder="Repeat password" autocomplete="new-password" required/>
            <button type="button" class="toggle-password" onclick="togglePass('confirmPassword','eyeIcon2')">
              <i id="eyeIcon2" class="bi bi-eye"></i>
            </button>
          </div>
        </div>

        <!-- Role notice -->
        <div class="role-notice">
          <i class="bi bi-info-circle-fill"></i>
          <span>New accounts are assigned <strong>Viewer</strong> role by default.
                Contact an admin to request elevated access.</span>
        </div>

        <!-- Submit -->
        <button type="submit" class="btn-login mt-3" id="registerBtn">
          <span id="btnText"><i class="bi bi-person-check me-2"></i>Create Account</span>
          <span id="btnSpinner" class="d-none">
            <span class="spinner-border spinner-border-sm me-2"></span>Creating...
          </span>
        </button>
      </form>

      <!-- Login link -->
      <div class="text-center mt-4" style="font-size:0.88rem;color:var(--text-muted)">
        Already have an account?
        <a href="index.html" style="color:var(--primary);font-weight:600">Sign In</a>
      </div>
    </div>

    <div class="login-footer">
      <i class="bi bi-shield-check me-1"></i>Protected by JWT Authentication • IDS-ML v2.0
    </div>
  </div>

  <script src="js/auth.js"></script>
  <script src="js/register.js"></script>
</body>
</html>
