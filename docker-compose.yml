
services:
  ids-ml-backend:
    build: .
    container_name: ids-ml-backend
    ports:
      # Mapping container port 8000 to local port 9001 (configured by frontend)
      - "9001:8000"
    volumes:
      # Mount the sqlite fallback database and logs so they persist across restarts
      - ./backend/ids_ml.db:/app/backend/ids_ml.db
      - ./logs:/app/logs
    env_file:
      - .env
    restart: unless-stopped
    networks:
      - ids_network

  ids-ml-frontend:
    build: ./frontend
    container_name: ids-ml-frontend
    ports:
      - "3000:80"
    restart: unless-stopped
    networks:
      - ids_network

networks:
  ids_network:
    driver: bridge
